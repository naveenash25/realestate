name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Build & push backend image
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/realestate/nodejs-api:${{ github.sha }} ./backend
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/realestate/nodejs-api:${{ github.sha }}

      - name: Build & push frontend image
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/realestate/nextjs-frontend:${{ github.sha }} ./frontend
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/realestate/nextjs-frontend:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy nodejs-api \
            --image ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/realestate/nodejs-api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --min-instances 1 \
            --max-instances 20 \
            --set-secrets DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,SESSION_JWT_SECRET=SESSION_JWT_SECRET:latest,KEYCLOAK_BACKEND_CLIENT_SECRET=KEYCLOAK_BACKEND_CLIENT_SECRET:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,MSG91_AUTH_KEY=MSG91_AUTH_KEY:latest \
            --no-allow-unauthenticated

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy nextjs-frontend \
            --image ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/realestate/nextjs-frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --min-instances 0 \
            --max-instances 10 \
            --allow-unauthenticated
