<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Owner Connect — Phone Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  :root{--blue:#1b4fd8;--navy-1:#0e2a63;--navy-2:#15409a;--ink:#0f1b2d;--body:#475467;--muted:#8a94a6;--bg:#eef1f6;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Archivo",system-ui,sans-serif;background:var(--bg);color:var(--body);}
  .hero{background:linear-gradient(135deg,var(--navy-1),var(--navy-2));color:#fff;padding:42px 32px 36px;}
  .hero h1{margin:0;font-size:34px;font-weight:900;letter-spacing:-.03em;}
  .hero p{margin:10px 0 0;color:#cdd8ee;font-size:15px;max-width:600px}
  .hero .meta{display:flex;gap:20px;margin-top:18px;flex-wrap:wrap;font-size:13px;font-weight:600;color:#e7eefb}
  .wrap{max-width:1320px;margin:0 auto;padding:34px 24px 60px}
  .grp-title{font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:34px 0 4px}
  .gallery{display:flex;flex-wrap:wrap;gap:40px 36px;justify-content:flex-start}
  .pcell{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .pcap{text-align:center}
  .pcap .t{font-size:14px;font-weight:800;color:var(--ink)}
  .pcap .d{font-size:12px;color:var(--muted)}
  .pframe-scale{transform:scale(.62);transform-origin:top center;margin-bottom:-336px}
  .device-shell{position:relative}
  .device-shell iframe{position:absolute;left:9px;top:0;width:384px;height:874px;border:0;border-radius:40px;background:#fff}
  .safe{position:absolute;left:9px;top:0;width:384px;height:50px;background:#0b1730;border-radius:40px 40px 0 0;z-index:5;pointer-events:none}
  .note{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid #e6e9ef;border-left:3px solid var(--blue);border-radius:12px;padding:14px 16px;margin-top:6px;font-size:13px;max-width:760px}
  a.back{color:#cfe0fc;font-weight:700;font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <a class="back" href="OC-00-Index.html">← All screens</a>
  <h1 style="margin-top:14px">Phone Screens</h1>
  <p>The same hi-fi screens at mobile width (iPhone). Each device shows the live, responsive page — with a mobile top bar and bottom tab navigation. Scroll inside any phone to explore the full screen.</p>
  <div class="meta"><span>📱 375–402px viewport</span><span>Bottom-tab nav per role</span><span>Live, scrollable pages</span></div>
</div>
<div id="root" class="wrap"></div>

<script type="text/babel">
const { useState } = React;

const SCREENS = {
  'Public & Buyer flow': [
    ['Homepage','Hero search + listings','Owner-Connect-Homepage-HiFi.html'],
    ['Search Results','Filters + verified cards','OC-03-Search-Results.html'],
    ['Property Listing','Lead-gated contact','OC-02-Property-Listing.html'],
    ['Login / OTP','Mobile-first auth','OC-16-Login.html'],
    ['Buyer Dashboard','Shortlist + visits','OC-18-Buyer-Dashboard.html'],
    ['Saved','Shortlist + alerts','OC-17-Saved.html'],
    ['Schedule Visit','Slot picker','OC-19-Schedule-Visit.html'],
    ['Chat','Owner conversation','OC-10-Chat.html'],
  ],
  'Owner flow': [
    ['Owner Dashboard','KPIs + wallet','OC-04-Owner-Dashboard.html'],
    ['Add Property','Wizard + docs','OC-05-Add-Property.html'],
    ['Lead Management','AI-scored leads','OC-06-Lead-Management.html'],
    ['Wallet','Balance + controls','OC-13-Wallet.html'],
    ['Notifications','Grouped centre','OC-20-Notifications.html'],
  ],
  'Admin flow': [
    ['Admin Dashboard','Queue + fraud','OC-07-Admin-Dashboard.html'],
    ['Verification','Doc review','OC-08-Verification.html'],
  ],
};

function Phone({ title, desc, src, dark }) {
  return (
    <div className="pcell">
      <div className="pframe-scale">
        <IOSDevice dark={dark}>
          <div className="device-shell" style={{height:'100%'}}>
            <div className="safe"></div>
            <iframe src={src} title={title} scrolling="yes"></iframe>
          </div>
        </IOSDevice>
      </div>
      <div className="pcap"><div className="t">{title}</div><div className="d">{desc}</div></div>
    </div>
  );
}

function App(){
  return (
    <div>
      {Object.entries(SCREENS).map(([grp, items]) => (
        <div key={grp}>
          <div className="grp-title">{grp}</div>
          <div className="gallery">
            {items.map(([t,d,s]) => <Phone key={s} title={t} desc={d} src={s} dark={true} />)}
          </div>
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<template id="__bundler_thumbnail"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#1b4fd8"/><g stroke="#fff" stroke-width="5" fill="none"><rect x="36" y="20" width="28" height="60" rx="7"/><circle cx="50" cy="72" r="2.5" fill="#fff" stroke="none"/></g></svg></template>
</body>
</html>
